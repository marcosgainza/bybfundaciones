<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-label="Caso 3: mejoramiento del suelo mediante una malla de inyecciones controladas de cemento para estabilizar la estructura">
  <defs>
    <linearGradient id="c3-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/><stop offset="1" stop-color="#e7ecf3"/>
    </linearGradient>
    <linearGradient id="c3-soil1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3e0d8"/><stop offset="1" stop-color="#d3cfc4"/>
    </linearGradient>
    <linearGradient id="c3-soil2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9c3b4"/><stop offset="1" stop-color="#b3ac99"/>
    </linearGradient>
    <radialGradient id="c3-cem" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#d7dbe1"/><stop offset="0.55" stop-color="#aab0ba"/><stop offset="1" stop-color="#8a909c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="720" height="460" fill="url(#c3-sky)"/>
  <!-- estratos -->
  <rect y="150" width="720" height="150" fill="url(#c3-soil1)"/>
  <rect y="300" width="720" height="160" fill="url(#c3-soil2)"/>
  <g stroke="#0d2b5b" stroke-opacity="0.10" stroke-width="1.5" stroke-dasharray="7 9">
    <line x1="0" y1="360" x2="720" y2="360"/>
    <line x1="0" y1="420" x2="720" y2="420"/>
  </g>

  <!-- base de la estructura -->
  <rect x="120" y="120" width="480" height="18" rx="2" fill="#0a2147"/>
  <rect x="150" y="96" width="420" height="24" rx="2" fill="url(#c3-sky)" opacity="0"/>
  <g fill="#0d2b5b" opacity="0.9">
    <rect x="150" y="102" width="120" height="18" rx="2"/>
    <rect x="300" y="102" width="120" height="18" rx="2"/>
    <rect x="450" y="102" width="120" height="18" rx="2"/>
  </g>

  <!-- malla de bulbos de cemento (mejoramiento de suelo) -->
  <g>
    <ellipse cx="200" cy="220" rx="52" ry="40" fill="url(#c3-cem)"/>
    <ellipse cx="310" cy="250" rx="56" ry="42" fill="url(#c3-cem)"/>
    <ellipse cx="420" cy="220" rx="54" ry="40" fill="url(#c3-cem)"/>
    <ellipse cx="520" cy="252" rx="52" ry="40" fill="url(#c3-cem)"/>
    <ellipse cx="255" cy="300" rx="50" ry="38" fill="url(#c3-cem)"/>
    <ellipse cx="470" cy="300" rx="50" ry="38" fill="url(#c3-cem)"/>
  </g>
  <g fill="#b6bcc6" opacity="0.9">
    <circle cx="200" cy="220" r="15"/><circle cx="310" cy="250" r="16"/>
    <circle cx="420" cy="220" r="15"/><circle cx="520" cy="252" r="15"/>
    <circle cx="255" cy="300" r="14"/><circle cx="470" cy="300" r="14"/>
  </g>

  <!-- lanzas de inyección -->
  <g stroke="#243244" stroke-width="6" stroke-linecap="round">
    <line x1="200" y1="138" x2="200" y2="216"/>
    <line x1="310" y1="138" x2="310" y2="246"/>
    <line x1="420" y1="138" x2="420" y2="216"/>
    <line x1="520" y1="138" x2="520" y2="248"/>
  </g>
  <g stroke="#f5a623" stroke-width="2.2" stroke-linecap="round">
    <line x1="200" y1="142" x2="200" y2="212"/>
    <line x1="310" y1="142" x2="310" y2="242"/>
    <line x1="420" y1="142" x2="420" y2="212"/>
    <line x1="520" y1="142" x2="520" y2="244"/>
  </g>

  <!-- rótulos -->
  <g font-family="Montserrat, system-ui, sans-serif" font-weight="700">
    <text x="120" y="90" font-size="12" fill="#0d2b5b">Estructura a estabilizar</text>
    <text x="26" y="200" font-size="10.5" font-weight="700" letter-spacing="0.12em" fill="#0d2b5b" opacity="0.55">MALLA DE INYECCIÓN</text>
    <line x1="546" y1="300" x2="602" y2="300" stroke="#6a7280" stroke-width="1.6"/>
    <circle cx="546" cy="300" r="3" fill="#6a7280"/>
    <text x="608" y="297" font-size="13" fill="#0d2b5b">Suelo</text>
    <text x="608" y="313" font-size="10.5" font-weight="600" fill="#5a616e">mejorado</text>
  </g>
</svg>
