<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-label="Caso 2: corrección de oquedad bajo contrapiso mediante inyección de mortero de cemento para restituir el apoyo">
  <defs>
    <linearGradient id="c2-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/><stop offset="1" stop-color="#e7ecf3"/>
    </linearGradient>
    <linearGradient id="c2-soil1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3e0d8"/><stop offset="1" stop-color="#d3cfc4"/>
    </linearGradient>
    <linearGradient id="c2-soil2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9c3b4"/><stop offset="1" stop-color="#b3ac99"/>
    </linearGradient>
    <radialGradient id="c2-cem" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#d7dbe1"/><stop offset="0.6" stop-color="#aab0ba"/><stop offset="1" stop-color="#8a909c"/>
    </radialGradient>
  </defs>

  <rect width="720" height="460" fill="url(#c2-sky)"/>
  <!-- estratos -->
  <rect y="150" width="720" height="150" fill="url(#c2-soil1)"/>
  <rect y="300" width="720" height="160" fill="url(#c2-soil2)"/>
  <g stroke="#0d2b5b" stroke-opacity="0.10" stroke-width="1.5" stroke-dasharray="7 9">
    <line x1="0" y1="360" x2="720" y2="360"/>
    <line x1="0" y1="420" x2="720" y2="420"/>
  </g>

  <!-- Piso terminado + contrapiso -->
  <rect x="86" y="120" width="480" height="16" rx="2" fill="#0d2b5b"/>
  <rect x="86" y="136" width="480" height="26" fill="#1b3d6e"/>
  <g stroke="#dbe3f0" stroke-opacity="0.25" stroke-width="1">
    <line x1="176" y1="120" x2="176" y2="162"/>
    <line x1="266" y1="120" x2="266" y2="162"/>
    <line x1="356" y1="120" x2="356" y2="162"/>
    <line x1="446" y1="120" x2="446" y2="162"/>
  </g>

  <!-- Oquedad rellenada con mortero -->
  <path d="M250 162 q40 44 110 46 q70 -2 110 -46 Z" fill="url(#c2-cem)" opacity="0.95"/>
  <path d="M250 162 q40 44 110 46 q70 -2 110 -46" fill="none" stroke="#6a7280" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.7"/>
  <g fill="#7f8794" opacity="0.5">
    <circle cx="320" cy="184" r="2.4"/><circle cx="360" cy="196" r="2"/>
    <circle cx="400" cy="184" r="2.6"/><circle cx="345" cy="176" r="1.8"/>
    <circle cx="385" cy="190" r="2.2"/>
  </g>

  <!-- lanza de inyección de mortero -->
  <g stroke="#243244" stroke-width="6.5" stroke-linecap="round"><line x1="360" y1="60" x2="360" y2="176"/></g>
  <g stroke="#f5a623" stroke-width="2.4" stroke-linecap="round"><line x1="360" y1="66" x2="360" y2="172"/></g>
  <rect x="345" y="44" width="30" height="20" rx="3" fill="#0d2b5b"/>
  <circle cx="360" cy="54" r="4" fill="#f5a623"/>

  <!-- flechas de relleno -->
  <g stroke="#6a7280" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M330 190 l-34 -6 M290 182 l6 2 -2 -6"/>
    <path d="M390 190 l34 -6 M430 182 l-6 2 2 -6"/>
  </g>

  <!-- rótulos -->
  <g font-family="Montserrat, system-ui, sans-serif" font-weight="700">
    <text x="94" y="112" font-size="12" fill="#0d2b5b">Contrapiso</text>
    <line x1="452" y1="196" x2="548" y2="220" stroke="#6a7280" stroke-width="1.4"/>
    <circle cx="452" cy="196" r="3" fill="#6a7280"/>
    <text x="554" y="216" font-size="13" fill="#0d2b5b">Inyección cementicia</text>
    <text x="554" y="232" font-size="10.5" font-weight="600" fill="#5a616e">rellena la oquedad</text>
    <text x="26" y="330" font-size="10.5" font-weight="700" letter-spacing="0.12em" fill="#0d2b5b" opacity="0.55">SUELO DE APOYO</text>
  </g>
</svg>
