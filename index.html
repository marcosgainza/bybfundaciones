  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rm:translateY(150px)} 74%{transform:translateY(0);opacity:1} 86%{opacity:1} 96%,100%{opacity:0} }\n  @keyframes bbCap { 0%,12%{opacity:0;transform:translateY(8px)} 22%{opacity:1;transform:none} 88%{opacity:1} 96%,100%{opacity:0} }\n  @keyframes bbCap2 { 0%,30%{opacity:0;transform:translateY(8px)} 40%{opacity:1;transform:none} 88%{opacity:1} 96%,100%{opacity:0} }\n  @keyframes bbCap3 { 0%,48%{opacity:0;transform:translateY(8px)} 58%{opacity:1;transform:none} 88%{opacity:1} 96%,100%{opacity:0} }\n  @keyframes bbCap4 { 0%,64%{opacity:0;transform:translateY(8px)} 74%{opacity:1;transform:none} 88%{opacity:1} 96%,100%{opacity:0} }\n  .bb-piece { position:absolute; inset:0; background-position:center; background-repeat:no-repeat; background-size:contain; }\n  /* aparición al scrollear */\n  .bb-rv { opacity:0; transform:translateY(26px); transition:opacity .7s cubic-bezier(0.22,1,0.36,1), transform .7s cubic-bezier(0.22,1,0.36,1); }\n  .bb-rv-in { opacity:1 !important; transform:none !important; }\n  /* latido del CTA de conversión */\n  @keyframes bbCtaPulse { 0%{box-shadow:0 0 0 0 rgba(13,43,91,0.45)} 70%{box-shadow:0 0 0 14px rgba(13,43,91,0)} 100%{box-shadow:0 0 0 0 rgba(13,43,91,0)} }\n  @keyframes bbCtaPulseLight { 0%{box-shadow:0 0 0 0 rgba(255,255,255,0.5)} 70%{box-shadow:0 0 0 14px rgba(255,255,255,0)} 100%{box-shadow:0 0 0 0 rgba(255,255,255,0)} }\n  .bb-cta { animation:bbCtaPulse 2.6s ease-out infinite; }\n  .bb-cta-light { animation:bbCtaPulseLight 2.6s ease-out infinite; }\n  .bb-cta:hover, .bb-cta-light:hover { animation-play-state:paused; }\n  /* resaltador de frases que venden */\n  .bb-mk { background:linear-gradient(180deg,transparent 62%, rgba(13,43,91,0.16) 62%); padding:0 2px; font-weight:700; color:var(--navy,#0D2B5B); }\n  .bb-float-cta { transition:transform .25s ease, opacity .35s ease; }\n  @media (prefers-reduced-motion: reduce){ .bb-cta,.bb-cta-light,.bb-piece{animation:none!important} .bb-rv{opacity:1;transform:none} }\n<\u002Fstyle>\n<script src=\"94552b70-5815-4613-b26b-f18d8ce4a57b\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"--navy:{{navy}}; --gray:{{gray}}; --gray-l:#DBD9DB; --ink:#1A1F2B; --mist:#F4F6F8; background:#FFFFFF; color:#1A1F2B; font-family:'Montserrat',system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow-x:hidden;\">\n\n  <!-- ===== HEADER ===== -->\n  <header style=\"position:sticky; top:0; z-index:50; background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); border-bottom:1px solid #E6E8EC;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:0 clamp(18px,4vw,48px); height:112px; display:flex; align-items:center; justify-content:space-between; gap:20px;\">\n      <a href=\"#inicio\" style=\"display:flex; align-items:center; gap:16px;\">\n        <img src=\"2276ca7c-5efe-4a69-a0df-ffd17eff8fa9\" alt=\"B&amp;B Ingeniería\" style=\"display:block; height:66px; width:auto; flex:0 0 auto;\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:8px; padding-left:2px;\">\n          <div style=\"display:flex; align-items:center; gap:11px;\">\n            <span style=\"width:24px; height:1.5px; background:var(--navy,#0D2B5B);\"><\u002Fspan>\n            <span style=\"font-weight:700; font-size:21px; letter-spacing:0.32em; text-transform:uppercase; color:var(--navy,#0D2B5B); padding-left:0.32em;\">Ingeniería<\u002Fspan>\n            <span style=\"width:24px; height:1.5px; background:var(--navy,#0D2B5B);\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px; width:100%;\">\n            <span style=\"flex:1; height:1.5px; background:var(--gray,#707274);\"><\u002Fspan>\n            <span style=\"width:5px; height:5px; border-radius:50%; background:var(--navy,#0D2B5B); flex:0 0 auto;\"><\u002Fspan>\n            <span style=\"flex:1; height:1.5px; background:var(--gray,#707274);\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px;\">\n            <span style=\"width:4px; height:4px; border-radius:50%; background:var(--gray,#707274);\"><\u002Fspan>\n            <span style=\"font-size:8.5px; font-weight:600; letter-spacing:0.26em; text-transform:uppercase; color:var(--gray,#707274); padding-left:0.26em;\">Refuerzo de Fundaciones<\u002Fspan>\n            <span style=\"width:4px; height:4px; border-radius:50%; background:var(--gray,#707274);\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n      <nav style=\"display:flex; align-items:center; gap:clamp(12px,2vw,30px);\">\n        <a href=\"#servicios\" style=\"font-size:13.5px; font-weight:600; color:#3A4150;\" style-hover=\"color:var(--navy,#0D2B5B);\">Servicios<\u002Fa>\n        <a href=\"#metodologia\" style=\"font-size:13.5px; font-weight:600; color:#3A4150;\" style-hover=\"color:var(--navy,#0D2B5B);\">Metodología<\u002Fa>\n        <a href=\"#casos\" style=\"font-size:13.5px; font-weight:600; color:#3A4150;\" style-hover=\"color:var(--navy,#0D2B5B);\">Casos<\u002Fa>\n        <a href=\"#faq\" style=\"font-size:13.5px; font-weight:600; color:#3A4150;\" style-hover=\"color:var(--navy,#0D2B5B);\">Preguntas<\u002Fa>\n        <a href=\"#nosotros\" style=\"font-size:13.5px; font-weight:600; color:#3A4150;\" style-hover=\"color:var(--navy,#0D2B5B);\">Nosotros<\u002Fa>\n        <a href=\"#contacto\" class=\"bb-cta\" style=\"display:inline-flex; align-items:center; gap:8px; background:var(--navy,#0D2B5B); color:#fff; font-size:13px; font-weight:700; padding:11px 18px; border-radius:4px;\" style-hover=\"background:#0A2147;\">Evaluación técnica<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section id=\"inicio\" style=\"position:relative; scroll-margin-top:124px; background:linear-gradient(180deg,#FFFFFF 0%,#F4F6F8 100%);\">\n    <div style=\"position:absolute; inset:0; background-image:linear-gradient(rgba(13,43,91,0.045) 1px,transparent 1px),linear-gradient(90deg,rgba(13,43,91,0.045) 1px,transparent 1px); background-size:44px 44px; pointer-events:none; mask-image:linear-gradient(180deg,#000,transparent 88%);\"><\u002Fdiv>\n    <div style=\"position:relative; max-width:1280px; margin:0 auto; padding:clamp(48px,7vw,96px) clamp(18px,4vw,48px); display:grid; grid-template-columns:minmax(0,1.12fr) minmax(0,0.88fr); gap:clamp(28px,4vw,60px); align-items:center;\">\n      <div style=\"min-width:0;\">\n        <div style=\"display:inline-flex; align-items:center; gap:10px; background:#fff; border:1px solid #E0E3E8; padding:7px 14px; border-radius:100px; box-shadow:0 1px 2px rgba(13,43,91,0.04);\">\n          <span style=\"width:7px; height:7px; border-radius:50%; background:var(--navy,#0D2B5B);\"><\u002Fspan>\n          <span style=\"font-size:11.5px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--navy,#0D2B5B);\">Ingeniería geotécnica · Paraná · Entre Ríos<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"margin-top:24px; font-weight:800; font-size:clamp(34px,5vw,60px); line-height:1.04; letter-spacing:-0.02em; color:var(--navy,#0D2B5B);\">Ingeniería aplicada a la estabilización de fundaciones.<\u002Fh1>\n        <p style=\"margin-top:22px; max-width:54ch; font-size:clamp(16px,1.4vw,18.5px); line-height:1.6; color:#3A4150;\">Desarrollamos soluciones de ingeniería para el mejoramiento de suelos y la estabilización de fundaciones mediante técnicas de inyección controlada, adaptadas a las condiciones particulares de cada estructura y de cada terreno.<\u002Fp>\n        <p style=\"margin-top:16px; max-width:54ch; font-size:15.5px; line-height:1.6; color:#5A616E;\">Intervenimos viviendas, edificios e instalaciones con asentamientos, grietas, hundimientos u oquedades, priorizando el análisis técnico, la seguridad estructural y la mínima afectación de la obra existente.<\u002Fp>\n        <div style=\"margin-top:32px; display:flex; flex-wrap:wrap; gap:13px;\">\n          <a href=\"#contacto\" class=\"bb-cta\" style=\"display:inline-flex; align-items:center; gap:10px; background:var(--navy,#0D2B5B); color:#fff; font-size:14px; font-weight:700; padding:15px 26px; border-radius:5px;\" style-hover=\"background:#0A2147;\">Solicitar evaluación técnica →<\u002Fa>\n          <a href=\"#servicios\" style=\"display:inline-flex; align-items:center; gap:10px; border:1.5px solid #CBD0D8; color:var(--navy,#0D2B5B); font-size:14px; font-weight:700; padding:15px 26px; border-radius:5px;\" style-hover=\"border-color:var(--navy,#0D2B5B); background:#fff;\">Ver servicios<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative; min-width:0;\">\n        <div style=\"position:relative; border-radius:8px; overflow:hidden; box-shadow:0 24px 60px -24px rgba(13,43,91,0.4); border:1px solid #E0E3E8;\">\n          <image-slot id=\"bb-hero\" style=\"width:100%; height:clamp(360px,42vw,480px);\" shape=\"rect\" placeholder=\"Arrastrá una foto de obra / inyección\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div style=\"position:absolute; left:-14px; bottom:-14px; background:var(--navy,#0D2B5B); color:#fff; padding:16px 20px; border-radius:8px; box-shadow:0 12px 30px -10px rgba(13,43,91,0.5);\">\n          <div style=\"font-size:11px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:#9DB2D6;\">Método<\u002Fdiv>\n          <div style=\"margin-top:5px; font-size:16px; font-weight:700;\">Inyección controlada<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== PILARES ===== -->\n  <sc-if value=\"{{ showPillars }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"background:var(--navy,#0D2B5B); color:#fff;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:clamp(26px,3vw,38px) clamp(18px,4vw,48px); display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:rgba(255,255,255,0.14);\">\n      <div style=\"background:var(--navy,#0D2B5B); padding:6px clamp(8px,1.5vw,22px); display:flex; align-items:center; gap:14px;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l7 3v5c0 4.4-3 7.7-7 9-4-1.3-7-4.6-7-9V6z\"><\u002Fpath><\u002Fsvg>\n        <div><div style=\"font-size:14.5px; font-weight:700;\">Seguridad<\u002Fdiv><div style=\"font-size:12px; color:#9DB2D6; margin-top:2px;\">Compromiso y confianza<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--navy,#0D2B5B); padding:6px clamp(8px,1.5vw,22px); display:flex; align-items:center; gap:14px;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"8\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M12 1v3M12 20v3M1 12h3M20 12h3\"><\u002Fpath><\u002Fsvg>\n        <div><div style=\"font-size:14.5px; font-weight:700;\">Precisión<\u002Fdiv><div style=\"font-size:12px; color:#9DB2D6; margin-top:2px;\">Ingeniería de calidad<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--navy,#0D2B5B); padding:6px clamp(8px,1.5vw,22px); display:flex; align-items:center; gap:14px;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"3\" width=\"16\" height=\"18\" rx=\"1\"><\u002Frect><path d=\"M9 21v-4h6v4M8 7h.01M12 7h.01M16 7h.01M8 11h.01M12 11h.01M16 11h.01\"><\u002Fpath><\u002Fsvg>\n        <div><div style=\"font-size:14.5px; font-weight:700;\">Solidez<\u002Fdiv><div style=\"font-size:12px; color:#9DB2D6; margin-top:2px;\">Fundaciones que perduran<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--navy,#0D2B5B); padding:6px clamp(8px,1.5vw,22px); display:flex; align-items:center; gap:14px;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 7V3M8 3L5 6M8 3l3 3M16 17v4M16 21l3-3M16 21l-3-3\"><\u002Fpath><\u002Fsvg>\n        <div><div style=\"font-size:14.5px; font-weight:700;\">Soluciones<\u002Fdiv><div style=\"font-size:12px; color:#9DB2D6; margin-top:2px;\">Innovación y eficiencia<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== PROBLEMAS ===== -->\n  <section id=\"problemas\" style=\"scroll-margin-top:124px; max-width:1280px; margin:0 auto; padding:clamp(60px,8vw,108px) clamp(18px,4vw,48px) clamp(20px,3vw,40px);\">\n    <div style=\"display:grid; grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr); gap:clamp(24px,4vw,56px); align-items:start; margin-bottom:clamp(36px,4vw,52px);\">\n      <div>\n        <div style=\"font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--gray,#707274);\">El problema<\u002Fdiv>\n        <h2 style=\"margin-top:14px; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em; color:var(--navy,#0D2B5B);\">¿Tu propiedad presenta alguno de estos problemas?<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:16.5px; line-height:1.65; color:#3A4150; padding-top:6px;\">Estos síntomas pueden ser consecuencia de problemas en el suelo de fundación. <span class=\"bb-mk\">Una evaluación técnica realizada a tiempo<\u002Fspan> permite identificar el origen del problema y definir la intervención más adecuada, evitando que los daños continúen evolucionando.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"group\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:14px;\">\n      <div style=\"border:1px solid #E6E8EC; border-radius:8px; padding:24px; background:#fff;\" style-hover=\"border-color:#0D2B5B;\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--navy,#0D2B5B)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 3h16v18H4zM12 3v6l-3 2 3 2-2 6\"><\u002Fpath><\u002Fsvg>\n        <h4 style=\"margin-top:16px; font-size:16.5px; font-weight:700; color:var(--navy,#0D2B5B);\">Grietas que crecen<\u002Fh4>\n        <p style=\"margin-top:7px; font-size:14px; line-height:1.55; color:#5A616E;\">Grietas en paredes o pisos que aparecen o continúan creciendo.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E6E8EC; border-radius:8px; padding:24px; background:#fff;\" style-hover=\"border-color:#0D2B5B;\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--navy,#0D2B5B)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"3\" width=\"14\" height=\"18\" rx=\"1\"><\u002Frect><path d=\"M14 3v18M9 12h.01\"><\u002Fpath><\u002Fsvg>\n        <h4 style=\"margin-top:16px; font-size:16.5px; font-weight:700; color:var(--navy,#0D2B5B);\">Aberturas que no cierran<\u002Fh4>\n        <p style=\"margin-top:7px; font-size:14px; line-height:1.55; color:#5A616E;\">Puertas o ventanas que dejaron de cerrar correctamente.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E6E8EC; border-radius:8px; padding:24px; background:#fff;\" style-hover=\"border-color:#0D2B5B;\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--navy,#0D2B5B)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 8h18M3 13l5-2 4 2 4-2 5 2M3 18h18\"><\u002Fpath><\u002Fsvg>\n        <h4 style=\"margin-top:16px; font-size:16.5px; font-weight:700; color:var(--navy,#0D2B5B);\">Pisos con desnivel<\u002Fh4>\n        <p style=\"margin-top:7px; font-size:14px; line-height:1.55; color:#5A616E;\">Pisos con desniveles o sectores hundidos.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E6E8EC; border-radius:8px; padding:24px; background:#fff;\" style-hover=\"border-color:#0D2B5B;\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--navy,#0D2B5B)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 4h7v16H4zM13 4h7v16h-7\"><\u002Fpath><\u002Fsvg>\n        <h4 style=\"margin-top:16px; font-size:16.5px; font-weight:700; color:var(--navy,#0D2B5B);\">Separaciones<\u002Fh4>\n        <p style=\"margin-top:7px; font-size:14px; line-height:1.55; color:#5A616E;\">Separación entre paredes, pisos o techos.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E6E8EC; border-radius:8px; padding:24px; background:#fff;\" style-hover=\"border-color:#0D2B5B;\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--navy,#0D2B5B)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M5 6v8c0 2 3 4 7 4s7-2 7-4V6\"><\u002Fpath><\u002Fsvg>\n        <h4 style=\"margin-top:16px; font-size:16.5px; font-weight:700; color:var(--navy,#0D2B5B);\">Hundimientos<\u002Fh4>\n        <p style=\"margin-top:7px; font-size:14px; line-height:1.55; color:#5A616E;\">Hundimientos alrededor de la vivienda o de la estructura.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E6E8EC; border-radius:8px; padding:24px; background:#fff;\" style-hover=\"border-color:#0D2B5B;\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--navy,#0D2B5B)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 5h18v6H3zM6 11v5M12 11v7M18 11v4M3 20h18\"><\u002Fpath><\u002Fsvg>\n        <h4 style=\"margin-top:16px; font-size:16.5px; font-weight:700; color:var(--navy,#0D2B5B);\">Asentamientos<\u002Fh4>\n        <p style=\"margin-top:7px; font-size:14px; line-height:1.55; color:#5A616E;\">Asentamientos que comprometen la estabilidad de la construcción.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:34px;\">\n      <a href=\"#contacto\" class=\"bb-cta\" style=\"display:inline-flex; align-items:center; gap:10px; background:var(--navy,#0D2B5B); color:#fff; font-size:14px; font-weight:700; padding:14px 24px; border-radius:5px;\" style-hover=\"background:#0A2147;\">Solicitar una evaluación →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SERVICIOS ===== -->\n  <section id=\"servicios\" style=\"scroll-margin-top:124px; background:var(--mist,#F4F6F8); border-top:1px solid #E6E8EC; border-bottom:1px solid #E6E8EC;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:clamp(60px,8vw,108px) clamp(18px,4vw,48px);\">\n      <div style=\"max-width:64ch;\">\n        <div style=\"font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--gray,#707274);\">Nuestros servicios<\u002Fdiv>\n        <h2 style=\"margin-top:14px; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em; color:var(--navy,#0D2B5B);\">Soluciones de ingeniería para estabilizar fundaciones y mejorar el suelo.<\u002Fh2>\n        <p style=\"margin-top:18px; font-size:16.5px; line-height:1.65; color:#3A4150;\">Cada intervención se diseña en función de las características del terreno, la estructura y el problema detectado. Antes de ejecutar cualquier trabajo, evaluamos el origen de la falla para definir la metodología más adecuada en cada caso.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"group\" style=\"margin-top:clamp(36px,4vw,52px); display:grid; grid-template-columns:repeat(2,1fr); gap:16px;\">\n        <div style=\"background:#fff; border:1px solid #E6E8EC; border-radius:10px; padding:clamp(26px,2.5vw,38px);\">\n          <div style=\"display:flex; align-items:center; gap:14px;\">\n            <div style=\"width:46px; height:46px; border-radius:8px; background:#EAF0F9; display:flex; align-items:center; justify-content:center; flex:0 0 auto;\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--navy,#0D2B5B)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:12px; font-weight:700; letter-spacing:0.12em; color:var(--gray,#707274);\">01<\u002Fdiv>\n          <\u002Fdiv>\n          <h3 style=\"margin-top:20px; font-size:21px; font-weight:700; color:var(--navy,#0D2B5B);\">Diagnóstico y Evaluación Técnica<\u002Fh3>\n          <p style=\"margin-top:12px; font-size:15px; line-height:1.62; color:#4A515E;\">Inspeccionamos en obra para identificar el origen del problema, evaluar el estado de la estructura y del terreno, y definir la estrategia de intervención. Es el punto de partida para evitar soluciones improvisadas.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E6E8EC; border-radius:10px; padding:clamp(26px,2.5vw,38px);\">\n          <div style=\"display:flex; align-items:center; gap:14px;\">\n            <div style=\"width:46px; height:46px; border-radius:8px; background:#EAF0F9; display:flex; align-items:center; justify-content:center; flex:0 0 auto;\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--navy,#0D2B5B)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2v7M9 5l3-3 3 3M5 22V11h14v11M9 22v-4h6v4\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:12px; font-weight:700; letter-spacing:0.12em; color:var(--gray,#707274);\">02<\u002Fdiv>\n          <\u002Fdiv>\n          <h3 style=\"margin-top:20px; font-size:21px; font-weight:700; color:var(--navy,#0D2B5B);\">Refuerzo de Fundaciones<\u002Fh3>\n          <p style=\"margin-top:12px; font-size:15px; line-height:1.62; color:#4A515E;\">Aplicamos técnicas de inyección controlada para mejorar el terreno de apoyo y recuperar la estabilidad de fundaciones afectadas por asentamientos diferenciales, con la menor afectación posible sobre la construcción.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E6E8EC; border-radius:10px; padding:clamp(26px,2.5vw,38px);\">\n          <div style=\"display:flex; align-items:center; gap:14px;\">\n            <div style=\"width:46px; height:46px; border-radius:8px; background:#EAF0F9; display:flex; align-items:center; justify-content:center; flex:0 0 auto;\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--navy,#0D2B5B)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 17l6-6 4 4 8-8M3 21h18\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:12px; font-weight:700; letter-spacing:0.12em; color:var(--gray,#707274);\">03<\u002Fdiv>\n          <\u002Fdiv>\n          <h3 style=\"margin-top:20px; font-size:21px; font-weight:700; color:var(--navy,#0D2B5B);\">Mejoramiento de Suelos<\u002Fh3>\n          <p style=\"margin-top:12px; font-size:15px; line-height:1.62; color:#4A515E;\">Intervenciones orientadas a mejorar la capacidad portante del terreno y reducir asentamientos, optimizando el comportamiento del suelo de apoyo en viviendas, edificios, plateas y estructuras existentes.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E6E8EC; border-radius:10px; padding:clamp(26px,2.5vw,38px);\">\n          <div style=\"display:flex; align-items:center; gap:14px;\">\n            <div style=\"width:46px; height:46px; border-radius:8px; background:#EAF0F9; display:flex; align-items:center; justify-content:center; flex:0 0 auto;\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--navy,#0D2B5B)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 4h16v6H4zM7 10v4a5 5 0 0010 0v-4M12 18v3\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:12px; font-weight:700; letter-spacing:0.12em; color:var(--gray,#707274);\">04<\u002Fdiv>\n          <\u002Fdiv>\n          <h3 style=\"margin-top:20px; font-size:21px; font-weight:700; color:var(--navy,#0D2B5B);\">Relleno de Oquedades<\u002Fh3>\n          <p style=\"margin-top:12px; font-size:15px; line-height:1.62; color:#4A515E;\">Corregimos cavidades y vacíos bajo pisos, plateas y fundaciones mediante inyecciones controladas, restableciendo el contacto entre el terreno y la estructura y reduciendo el riesgo de nuevos hundimientos.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== METODOLOGÍA ===== -->\n  <section id=\"metodologia\" style=\"scroll-margin-top:124px; max-width:1280px; margin:0 auto; padding:clamp(60px,8vw,108px) clamp(18px,4vw,48px);\">\n    <div style=\"max-width:60ch;\">\n      <div style=\"font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--gray,#707274);\">Cómo trabajamos<\u002Fdiv>\n      <h2 style=\"margin-top:14px; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em; color:var(--navy,#0D2B5B);\">Nuestra metodología de trabajo<\u002Fh2>\n      <p style=\"margin-top:18px; font-size:16.5px; line-height:1.65; color:#3A4150;\">Cada proyecto presenta condiciones particulares. Seguimos un proceso que nos permite comprender el origen del problema, diseñar la solución más adecuada y ejecutar la intervención con control permanente.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"margin-top:clamp(40px,5vw,60px); position:relative;\">\n      <div style=\"position:absolute; left:0; right:0; top:27px; height:2px; background:linear-gradient(90deg,var(--navy,#0D2B5B),var(--gray-l,#DBD9DB)); opacity:0.3;\"><\u002Fdiv>\n      <div data-reveal=\"group\" style=\"position:relative; display:grid; grid-template-columns:repeat(5,1fr); gap:clamp(12px,1.5vw,24px);\">\n        <div>\n          <div style=\"width:56px; height:56px; border-radius:50%; background:var(--navy,#0D2B5B); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800;\">1<\u002Fdiv>\n          <h4 style=\"margin-top:18px; font-size:16px; font-weight:700; color:var(--navy,#0D2B5B); line-height:1.2;\">Evaluación y diagnóstico<\u002Fh4>\n          <p style=\"margin-top:9px; font-size:13.5px; line-height:1.55; color:#5A616E;\">Visita a obra para relevar la estructura, identificar síntomas y analizar las causas del problema.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"width:56px; height:56px; border-radius:50%; background:var(--navy,#0D2B5B); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800;\">2<\u002Fdiv>\n          <h4 style=\"margin-top:18px; font-size:16px; font-weight:700; color:var(--navy,#0D2B5B); line-height:1.2;\">Diseño de la intervención<\u002Fh4>\n          <p style=\"margin-top:9px; font-size:13.5px; line-height:1.55; color:#5A616E;\">Definimos metodología, puntos de intervención, materiales y secuencia de ejecución.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"width:56px; height:56px; border-radius:50%; background:var(--navy,#0D2B5B); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800;\">3<\u002Fdiv>\n          <h4 style=\"margin-top:18px; font-size:16px; font-weight:700; color:var(--navy,#0D2B5B); line-height:1.2;\">Ejecución<\u002Fh4>\n          <p style=\"margin-top:9px; font-size:13.5px; line-height:1.55; color:#5A616E;\">Mejoramiento del suelo y estabilización mediante inyección controlada con equipamiento especializado.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"width:56px; height:56px; border-radius:50%; background:var(--navy,#0D2B5B); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800;\">4<\u002Fdiv>\n          <h4 style=\"margin-top:18px; font-size:16px; font-weight:700; color:var(--navy,#0D2B5B); line-height:1.2;\">Monitoreo y control<\u002Fh4>\n          <p style=\"margin-top:9px; font-size:13.5px; line-height:1.55; color:#5A616E;\">Verificamos el comportamiento de la estructura durante toda la intervención.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"width:56px; height:56px; border-radius:50%; background:#fff; border:2px solid var(--navy,#0D2B5B); color:var(--navy,#0D2B5B); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800;\">5<\u002Fdiv>\n          <h4 style=\"margin-top:18px; font-size:16px; font-weight:700; color:var(--navy,#0D2B5B); line-height:1.2;\">Informe técnico<\u002Fh4>\n          <p style=\"margin-top:9px; font-size:13.5px; line-height:1.55; color:#5A616E;\">Entregamos documentación con el detalle de los trabajos y los registros técnicos obtenidos.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== POR QUÉ ===== -->\n  <section id=\"porque\" style=\"scroll-margin-top:124px; background:var(--navy,#0D2B5B); color:#fff;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:clamp(60px,8vw,108px) clamp(18px,4vw,48px);\">\n      <div style=\"display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:clamp(28px,4vw,64px); align-items:start;\">\n        <div>\n          <div style=\"font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#9DB2D6;\">Por qué elegirnos<\u002Fdiv>\n          <h2 style=\"margin-top:14px; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em;\">¿Por qué elegir B&amp;B Ingeniería?<\u002Fh2>\n          <p style=\"margin-top:20px; font-size:16.5px; line-height:1.65; color:#C7D2E6;\">Cada intervención comienza con una pregunta: ¿cuál es la causa del problema? Entendemos que una reparación efectiva empieza por comprender el origen de la falla. Por eso analizamos cada caso de forma particular antes de definir la metodología.<\u002Fp>\n          <p style=\"margin-top:16px; font-size:15.5px; line-height:1.65; color:#9DB2D6;\">Nuestro trabajo combina experiencia en ingeniería, conocimiento geotécnico y ejecución especializada para brindar soluciones adaptadas a cada proyecto.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"group\" style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.14); border-radius:10px; overflow:hidden;\">\n          <div style=\"background:var(--navy,#0D2B5B); padding:24px;\">\n            <h4 style=\"font-size:15.5px; font-weight:700;\">Experiencia geotécnica<\u002Fh4>\n            <p style=\"margin-top:8px; font-size:13px; line-height:1.55; color:#9DB2D6;\">Años de trabajo en estudios de suelos, fundaciones y obras de ingeniería.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:var(--navy,#0D2B5B); padding:24px;\">\n            <h4 style=\"font-size:15.5px; font-weight:700;\">Soluciones a medida<\u002Fh4>\n            <p style=\"margin-top:8px; font-size:13px; line-height:1.55; color:#9DB2D6;\">No usamos procedimientos estándar. Cada intervención se diseña según el caso.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:var(--navy,#0D2B5B); padding:24px;\">\n            <h4 style=\"font-size:15.5px; font-weight:700;\">Equipamiento especializado<\u002Fh4>\n            <p style=\"margin-top:8px; font-size:13px; line-height:1.55; color:#9DB2D6;\">Equipos específicos para inyecciones controladas y mejoramiento de suelos.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:var(--navy,#0D2B5B); padding:24px;\">\n            <h4 style=\"font-size:15.5px; font-weight:700;\">Monitoreo en ejecución<\u002Fh4>\n            <p style=\"margin-top:8px; font-size:13px; line-height:1.55; color:#9DB2D6;\">Controlamos el comportamiento de la estructura durante los trabajos.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:var(--navy,#0D2B5B); padding:24px;\">\n            <h4 style=\"font-size:15.5px; font-weight:700;\">Mínima afectación<\u002Fh4>\n            <p style=\"margin-top:8px; font-size:13px; line-height:1.55; color:#9DB2D6;\">Metodologías que alteran lo menos posible la construcción existente.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:var(--navy,#0D2B5B); padding:24px;\">\n            <h4 style=\"font-size:15.5px; font-weight:700;\">Respaldo técnico<\u002Fh4>\n            <p style=\"margin-top:8px; font-size:13px; line-height:1.55; color:#9DB2D6;\">Cada obra sigue criterios de ingeniería y procedimientos fundamentados.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CASOS ===== -->\n  <section id=\"casos\" style=\"scroll-margin-top:124px; max-width:1280px; margin:0 auto; padding:clamp(60px,8vw,108px) clamp(18px,4vw,48px);\">\n    <div style=\"max-width:62ch;\">\n      <div style=\"font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--gray,#707274);\">Obras realizadas<\u002Fdiv>\n      <h2 style=\"margin-top:14px; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em; color:var(--navy,#0D2B5B);\">Problemas resueltos, no solo fotos.<\u002Fh2>\n      <p style=\"margin-top:18px; font-size:16.5px; line-height:1.65; color:#3A4150;\">Cada obra presenta desafíos particulares. Analizamos el problema, comprendemos su origen y desarrollamos la intervención más adecuada para recuperar la estabilidad de la estructura.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"group\" style=\"margin-top:clamp(36px,4vw,52px); display:grid; gap:18px;\">\n      <article style=\"display:grid; grid-template-columns:minmax(0,0.78fr) minmax(0,1.22fr); gap:clamp(20px,3vw,40px); align-items:center; border:1px solid #E6E8EC; border-radius:12px; overflow:hidden; background:#fff;\">\n        <image-slot id=\"bb-caso1\" style=\"width:100%; height:clamp(220px,22vw,280px);\" shape=\"rect\" placeholder=\"Foto del caso 1\"><\u002Fimage-slot>\n        <div style=\"padding:clamp(22px,2vw,34px) clamp(22px,2vw,40px) clamp(22px,2vw,34px) 0;\">\n          <div style=\"display:flex; align-items:center; gap:12px; flex-wrap:wrap;\">\n            <span style=\"font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#fff; background:var(--navy,#0D2B5B); padding:5px 11px; border-radius:100px;\">Caso 01<\u002Fspan>\n            <span style=\"font-size:12.5px; font-weight:600; color:var(--gray,#707274);\">Paraná, Entre Ríos · Vivienda unifamiliar<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"margin-top:14px; font-size:21px; font-weight:700; color:var(--navy,#0D2B5B);\">Refuerzo de fundaciones en vivienda unifamiliar<\u002Fh3>\n          <div style=\"margin-top:14px; display:grid; gap:9px;\">\n            <p style=\"font-size:14.5px; line-height:1.55; color:#4A515E;\"><strong style=\"color:var(--navy,#0D2B5B);\">Situación inicial.<\u002Fstrong> Fisuras en distintos muros, desniveles en sectores del piso y asentamientos diferenciales que comprometían la estabilidad.<\u002Fp>\n            <p style=\"font-size:14.5px; line-height:1.55; color:#4A515E;\"><strong style=\"color:var(--navy,#0D2B5B);\">Intervención.<\u002Fstrong> Plan de refuerzo mediante inyecciones controladas para consolidar el suelo de apoyo y mejorar la estabilidad de las fundaciones.<\u002Fp>\n            <p style=\"font-size:14.5px; line-height:1.55; color:#4A515E;\"><strong style=\"color:var(--navy,#0D2B5B);\">Resultado.<\u002Fstrong> Estructura estabilizada y detención de los asentamientos, permitiendo la posterior reparación de las fisuras.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n      <article style=\"display:grid; grid-template-columns:minmax(0,1.22fr) m --gray,#707274); font-style:italic;\">Casos de referencia. Se ajustarán con nombres, fechas y fotos reales de cada obra.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== FAQ ===== -->\n  <section id=\"faq\" style=\"scroll-margin-top:124px; background:var(--mist,#F4F6F8); border-top:1px solid #E6E8EC; border-bottom:1px solid #E6E8EC;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:clamp(60px,8vw,108px) clamp(18px,4vw,48px);\">\n      <div style=\"text-align:center; margin-bottom:clamp(32px,4vw,48px);\">\n        <div style=\"font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--gray,#707274);\">Preguntas frecuentes<\u002Fdiv>\n        <h2 style=\"margin-top:14px; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em; color:var(--navy,#0D2B5B);\">Las dudas más comunes, respondidas.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:10px; align-items:start;\">\n        <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"6\">\n          <div style=\"background:#fff; border:1px solid #E6E8EC; border-radius:8px; overflow:hidden;\">\n            <button onclick=\"{{ f.toggle }}\" style=\"width:100%; display:flex; align-items:center; justify-content:space-between; gap:16px; text-align:left; background:none; border:none; cursor:pointer; padding:19px 22px; font-family:'Montserrat',sans-serif; font-size:15.5px; font-weight:700; color:var(--navy,#0D2B5B);\">\n              <span>{{ f.q }}<\u002Fspan>\n              <span style=\"flex:0 0 auto; width:24px; height:24px; border-radius:50%; background:#EAF0F9; color:var(--navy,#0D2B5B); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700;\">{{ f.sign }}<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:0 22px 20px; font-size:14.5px; line-height:1.62; color:#4A515E;\">{{ f.a }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== NOSOTROS ===== -->\n  <section id=\"nosotros\" style=\"scroll-margin-top:124px; max-width:1280px; margin:0 auto; padding:clamp(60px,8vw,108px) clamp(18px,4vw,48px);\">\n    <div style=\"display:grid; grid-template-columns:minmax(0,1.05fr) minmax(0,0.95fr); gap:clamp(28px,4vw,64px); align-items:center;\">\n      <div>\n        <div style=\"font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--gray,#707274);\">Quiénes somos<\u002Fdiv>\n        <h2 style=\"margin-top:14px; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em; color:var(--navy,#0D2B5B);\">Ingeniería, experiencia y compromiso en cada intervención.<\u002Fh2>\n        <p style=\"margin-top:20px; font-size:16px; line-height:1.65; color:#3A4150;\">B&amp;B Ingeniería nace con el objetivo de brindar soluciones especializadas para la estabilización de fundaciones y el mejoramiento de suelos, aplicando criterios de ingeniería a problemas que requieren mucho más que una simple reparación.<\u002Fp>\n        <p style=\"margin-top:14px; font-size:15.5px; line-height:1.65; color:#4A515E;\">La empresa está integrada por los ingenieros civiles <strong style=\"color:var(--navy,#0D2B5B);\">Bruno Barbagelata<\u002Fstrong> y <strong style=\"color:var(--navy,#0D2B5B);\">Fausto Barbagelata<\u002Fstrong>, profesionales con amplia trayectoria en ingeniería geotécnica, estudios de suelos y proyectos de ingeniería civil.<\u002Fp>\n        <p style=\"margin-top:14px; font-size:15.5px; line-height:1.65; color:#4A515E;\">No aplicamos soluciones estándar. Cada intervención comienza con una evaluación técnica del problema, continúa con el diseño de una estrategia específica y finaliza con una ejecución cuidadosamente controlada. Nuestro objetivo no es únicamente reparar una fundación, sino devolver estabilidad a la estructura.<\u002Fp>\n        <div style=\"margin-top:26px; display:flex; flex-wrap:wrap; gap:10px;\">\n          <span style=\"font-size:12.5px; font-weight:600; color:var(--navy,#0D2B5B); border:1px solid #CBD0D8; padding:9px 15px; border-radius:100px;\">Ingeniería civil<\u002Fspan>\n          <span style=\"font-size:12.5px; font-weight:600; color:var(--navy,#0D2B5B); border:1px solid #CBD0D8; padding:9px 15px; border-radius:100px;\">Geotecnia<\u002Fspan>\n          <span style=\"font-size:12.5px; font-weight:600; color:var(--navy,#0D2B5B); border:1px solid #CBD0D8; padding:9px 15px; border-radius:100px;\">Inyección controlada<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;\">\n        <div style=\"border-radius:10px; overflow:hidden; border:1px solid #E0E3E8; box-shadow:0 20px 50px -22px rgba(13,43,91,0.35);\">\n          <image-slot id=\"bb-team\" style=\"width:100%; height:clamp(320px,38vw,440px);\" shape=\"rect\" placeholder=\"Foto de Bruno y Fausto Barbagelata\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== ANIMACIÓN LOGO ===== -->\n  <section style=\"position:relative; background:#FFFFFF; border-top:1px solid #E6E8EC; overflow:hidden;\">\n    <div style=\"position:absolute; inset:0; background-image:linear-gradient(rgba(13,43,91,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(13,43,91,0.04) 1px,transparent 1px); background-size:44px 44px; pointer-events:none; mask-image:radial-gradient(ellipse 70% 70% at 50% 45%,#000,transparent 80%);\"><\u002Fdiv>\n    <div style=\"position:relative; max-width:1280px; margin:0 auto; padding:clamp(56px,7vw,96px) clamp(18px,4vw,48px); text-align:center;\">\n      <div style=\"font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--gray,#707274);\">La marca<\u002Fdiv>\n      <h2 style=\"margin-top:14px; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em; color:var(--navy,#0D2B5B);\">Cómo se forma nuestro logo<\u002Fh2>\n      <p style=\"margin:16px auto 0; max-width:54ch; font-size:16px; line-height:1.6; color:#4A515E;\">Cada elemento tiene un significado: las dos B de Barbagelata, la unión de ambos socios, y las flechas que representan el refuerzo y la estabilización de las fundaciones.<\u002Fp>\n\n      <div style=\"margin:clamp(36px,4vw,52px) auto 0; position:relative; width:clamp(240px,30vw,330px); aspect-ratio:337/246;\">\n        <div class=\"bb-piece\" style=\"background-image:url(&quot;3cb27c79-9149-4270-98c0-1afb0e30413d&quot;); animation:bbUp 6.5s cubic-bezier(0.22,1,0.36,1) infinite;\"><\u002Fdiv>\n        <div class=\"bb-piece\" style=\"background-image:url(&quot;8ed9dca3-6382-48c7-8141-d41692d133a5&quot;); animation:bbDown 6.5s cubic-bezier(0.22,1,0.36,1) infinite;\"><\u002Fdiv>\n        <div class=\"bb-piece\" style=\"background-image:url(&quot;836b6f00-9700-4df0-90b1-b2757de6d0d8&quot;); animation:bbLeftB 6.5s cubic-bezier(0.22,1,0.36,1) infinite;\"><\u002Fdiv>\n        <div class=\"bb-piece\" style=\"background-image:url(&quot;2719a2bb-0417-446b-8df1-4ab8d639d8e3&quot;); animation:bbRightB 6.5s cubic-bezier(0.22,1,0.36,1) infinite;\"><\u002Fdiv>\n        <div class=\"bb-piece\" style=\"background-image:url(&quot;080e7465-90cc-421f-acd2-e56205d0ff19&quot;); animation:bbAmp 6.5s cubic-bezier(0.34,1.56,0.64,1) infinite;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin:clamp(36px,4vw,52px) auto 0; max-width:960px; display:grid; grid-template-columns:repeat(4,1fr); gap:14px;\">\n        <div style=\"border:1px solid #E6E8EC; border-radius:10px; padding:20px 16px; background:#fff; animation:bbCap 6.5s ease-in-out infinite;\">\n          <div style=\"font-weight:800; font-size:26px; color:var(--navy,#0D2B5B); line-height:1;\">B&nbsp;&nbsp;B<\u002Fdiv>\n          <h4 style=\"margin-top:12px; font-size:14.5px; font-weight:700; col 3.2-1.4-.1-.1-.3-.2-.6-.3M12 2a10 10 0 00-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1012 2\"><\u002Fpath><\u002Fsvg>\n  <\u002Fa>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0D2B5B&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Marca&quot;},&quot;secondaryColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#707274&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Marca&quot;},&quot;showPillars&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Secciones&quot;}}\">\nconst FAQ_DATA = [\n  { q: '¿Cómo sé si las grietas de mi vivienda son un problema de fundación?', a: 'No todas las grietas tienen el mismo origen. Algunas son superficiales y se relacionan con retracciones o movimientos propios de los materiales, mientras que otras pueden indicar asentamientos de la fundación. Una evaluación técnica permite determinar la causa y definir si es necesaria una intervención.' },\n  { q: '¿Es posible reparar una fundación sin demoler la vivienda?', a: 'En muchos casos sí. Las técnicas de inyección controlada permiten intervenir el terreno de apoyo con una afectación mínima de la estructura existente, reduciendo la necesidad de demoliciones y acortando los tiempos de obra.' },\n  { q: '¿Cómo determinan dónde realizar las inyecciones?', a: 'Cada proyecto comienza con una evaluación técnica. A partir del análisis de la estructura, las características del terreno y los daños observados, se define la ubicación de los puntos de intervención y la metodología más adecuada.' },\n  { q: '¿Cuánto tiempo demora una intervención?', a: 'Depende de las características y dimensiones de cada obra. En viviendas particulares la ejecución suele completarse en pocos días, aunque el plazo definitivo se determina luego de la evaluación técnica.' },\n  { q: '¿Es necesario abandonar la vivienda durante los trabajos?', a: 'Generalmente no. La mayoría de las intervenciones pueden realizarse con la vivienda habitada, ya que son procedimientos localizados y con una afectación reducida sobre la estructura existente.' },\n  { q: '¿Las grietas desaparecen después del refuerzo de fundaciones?', a: 'El objetivo principal es estabilizar la estructura y detener los movimientos que originan las fisuras. Una vez lograda la estabilización, las grietas existentes pueden repararse mediante trabajos de terminación, evitando que vuelvan a aparecer por la misma causa.' },\n  { q: '¿La solución es definitiva?', a: 'Cada intervención se diseña para resolver el problema identificado en la evaluación técnica. Cuando se actúa sobre la causa que origina los asentamientos y las condiciones de la estructura lo permiten, se obtiene una solución estable y duradera.' },\n  { q: '¿Realizan la evaluación técnica antes de presupuestar?', a: 'Sí. Antes de definir una propuesta de intervención realizamos una evaluación del problema para comprender su origen y determinar la solución más adecuada para cada caso.' },\n  { q: '¿Trabajan únicamente en viviendas?', a: 'Si bien gran parte de nuestras intervenciones se realizan en viviendas particulares, también desarrollamos soluciones para edificios, estructuras industriales, galpones y otras construcciones que requieran estabilización de fundaciones o mejoramiento de suelos.' },\n  { q: '¿En qué zonas trabajan?', a: 'Actualmente desarrollamos obras principalmente en la ciudad de Paraná, el resto de la provincia de Entre Ríos y la ciudad de Santa Fe.' },\n];\n\nclass Component extends DCLogic {\n  state = { openFaq: 0 };\n  componentDidMount() {\n    if (typeof window === 'undefined' || this._revInit) return;\n    this._revInit = true;\n    const start = () => {\n      const groups = Array.from(document.querySelectorAll('[data-reveal]'));\n      const io = ('IntersectionObserver' in window) ? new IntersectionObserver((entries, obs) => {\n        entries.forEach(e => { if (e.isIntersecting) { revealNow(e.target); obs.unobserve(e.target); } });\n      }, { threshold: 0.1, rootMargin: '0px 0px -7% 0px' }) : null;\n      const items = (host) => host.getAttribute('data-reveal') === 'group' ? Array.from(host.children) : [host];\n      const revealNow = (host) => items(host).forEach(n => n.classList.add('bb-rv-in'));\n      groups.forEach(host => {\n        items(host).forEach((n, i) => {\n          n.classList.add('bb-rv');\n          n.style.transitionDelay = (host.getAttribute('data-reveal') === 'group' ? i * 90 : 0) + 'ms';\n        });\n        if (io) io.observe(host); else revealNow(host);\n      });\n    };\n    // run after paint so layout is ready\n    requestAnimationFrame(() => requestAnimationFrame(start));\n  }\n  renderVals() {\n    const faqs = FAQ_DATA.map((f, i) => ({\n      q: f.q,\n      a: f.a,\n      open: this.state.openFaq === i,\n      sign: this.state.openFaq === i ? '–' : '+',\n      toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? null : i })),\n    }));\n    return {\n      navy: this.props.accentColor ?? '#0D2B5B',\n      gray: this.props.secondaryColor ?? '#707274',\n      showPillars: this.props.showPillars ?? true,\n      year: new Date().getFullYear(),\n      btnLabel: 'Enviar solicitud →',\n      faqs,\n      onSubmit: (e) => { e.preventDefault(); e.target.reset(); alert('¡Gracias! Te contactamos a la brevedad para coordinar la visita técnica.'); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
